</head>
<body>

<header>
  <div class="logo-area">
    <span>🌶️🫑🧂</span>
  </div>
  <nav>
    <ul>
      <li><a href="index.html">home</a></li>
      <li class="dropdown">
        <a href="restaurant_korean.html">menu</a>
        <div class="dropdown-content">
          <a href="restaurant_korean.html">한식</a>
          <a href="restaurant_chinese.html">중식</a>
          <a href="restaurant_japanese.html">일식</a>
          <a href="restaurant_vietnam.html">베트남</a>

      </li>
      <li><a href="rating.html">rating</a></li>
      <li class="dropdown">

          <a href="price_3.html">💰💰💰 고급이에요</a>
        </div>
      </li>
    </ul>
  </nav>
</header>

<main>
  <div class="form-section">
    <h2>⭐ 맛집 평점 남기기</h2>
    <form name="ratingForm" method="get">
      <fieldset>
        <legend>평점 정보 입력</legend>

        <div class="form-group">
          <label>식당 이름</label>
          <input type="text" size="30" placeholder="식당 이름을 입력하세요">
        </div>

        <div class="form-group">
          <label>닉네임</label>
          <input type="text" size="20" placeholder="닉네임을 입력하세요">
        </div>

        <div class="form-group">
          <label>별점</label><br>
          <input type="radio" name="star" value="5"> ★★★★★ (5점)&nbsp;&nbsp;
          <input type="radio" name="star" value="4"> ★★★★☆ (4점)&nbsp;&nbsp;
          <input type="radio" name="star" value="3"> ★★★☆☆ (3점)&nbsp;&nbsp;
          <input type="radio" name="star" value="2"> ★★☆☆☆ (2점)&nbsp;&nbsp;
          <input type="radio" name="star" value="1"> ★☆☆☆☆ (1점)
        </div>

        <div class="form-group">
          <label>리뷰</label><br>
          <textarea name="review" placeholder="방문 후기를 남겨주세요..."></textarea>
        </div>

        <input type="submit" class="submit-btn" value="리뷰 등록">
      </fieldset>
    </form>
  </div>
</main>
</body>
</html>
