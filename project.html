  <body>
    <div id="page-suggestion" class="suggestion-section">
      <main>
        <h2>💬 맛집 추가 건의하기</h2>
        <br />
        <form name="suggestionForm" method="get">
          <fieldset>
            <legend>추가 건의 정보</legend>
            <div class="form-group">
              <label>식당 이름</label>
              <input type="text" size="30" placeholder="추천할 식당 이름" />
            </div>
            <div class="form-group">
              <label>음식 종류</label><br />
              <input type="radio" name="food_type" value="한식" /> 한식
              <input type="radio" name="food_type" value="중식" /> 중식
              <input type="radio" name="food_type" value="일식" /> 일식
              <input type="radio" name="food_type" value="일식" /> 양식
              <input type="radio" name="food_type" value="일식" /> 카페
            </div>
            <div class="form-group">
              <label>주소</label>
              <input type="text" size="40" placeholder="경북 포항시 북구 ..." />
            </div>
            <div class="form-group">
              <label>추천 이유</label><br />
              <textarea
                name="reason"
                placeholder="이 식당을 추천하는 이유를 알려주세요..."
              ></textarea>
            </div>
            <input type="submit" class="submit-btn" value="건의 제출" />
          </fieldset>
        </form>
      </main>
    </div>
